<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Connection lines -->
  <g stroke="#38bdf8" stroke-width="1" opacity="0.2">
    <line x1="100" y1="50" x2="50" y2="100" />
    <line x1="100" y1="50" x2="150" y2="100" />
    <line x1="50" y1="100" x2="100" y2="150" />
    <line x1="150" y1="100" x2="100" y2="150" />
    <line x1="50" y1="100" x2="150" y2="100" />
  </g>

  <!-- Nodes -->
  <circle cx="100" cy="50" r="8" fill="url(#nodeGrad)" opacity="0.7" />
  <circle cx="50" cy="100" r="6" fill="#38bdf8" opacity="0.5" />
  <circle cx="150" cy="100" r="6" fill="#818cf8" opacity="0.5" />
  <circle cx="100" cy="150" r="8" fill="url(#nodeGrad)" opacity="0.7" />

  <!-- Outer decorative dots -->
  <circle cx="25" cy="60" r="2" fill="#06b6d4" opacity="0.3" />
  <circle cx="175" cy="140" r="3" fill="#818cf8" opacity="0.3" />
  <circle cx="170" cy="55" r="2" fill="#38bdf8" opacity="0.2" />
  <circle cx="30" cy="145" r="2" fill="#38bdf8" opacity="0.2" />
</svg>
